# This workflow will build and test the Python package without uploading to PyPI
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        python -m pip install --upgrade build
    - name: Build sdist and wheel
      run: |
        python -m build
    - name: Verify distributions
      run: |
        ls -lh dist/
        # Ensure both sdist and wheel were created
        ls dist/*.tar.gz
        ls dist/*.whl
    - name: Test install wheel
      run: |
        python -m pip install dist/*.whl --no-deps
        # Verify the package is installed and metadata is accessible
        python -m pip show xslim
        python - <<'PY'
        from importlib.metadata import distribution

        entry_points = {
            entry_point.name: entry_point.value
            for entry_point in distribution("xslim").entry_points
            if entry_point.group == "console_scripts"
        }
        assert entry_points.get("xslim") == "xslim.__main__:main"
        PY
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-python3.12
        path: dist/
