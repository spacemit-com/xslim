# This workflow will build and test the Python package without uploading to PyPI
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install build tools
      run: |
        python -m pip install --upgrade pip setuptools wheel build
    - name: Build sdist and wheel
      run: |
        python -m build
    - name: Verify distributions
      run: |
        ls -lh dist/
        # Ensure both sdist and wheel were created
        ls dist/*.tar.gz
        ls dist/*.whl
    - name: Test install wheel
      run: |
        pip install dist/*.whl --no-deps
        # Verify the package is installed and metadata is accessible
        pip show xslim
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-python3.12
        path: dist/
