# This workflow will build and test the Python package without uploading to PyPI
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install build tools
      run: |
        python -m pip install --upgrade pip setuptools wheel build
    - name: Build sdist and wheel
      run: |
        python -m build
    - name: Verify distributions
      run: |
        ls -lh dist/
        # Ensure both sdist and wheel were created
        test -f dist/*.tar.gz
        test -f dist/*.whl
    - name: Test install wheel
      run: |
        pip install dist/*.whl --no-deps
        # Verify the package is installed and metadata is accessible
        pip show xslim
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-python${{ matrix.python-version }}
        path: dist/
