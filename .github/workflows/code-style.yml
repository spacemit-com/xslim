name: Code Style

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  ruff:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"
    - name: Install Ruff
      run: |
        python -m pip install --upgrade pip
        python -m pip install ruff==0.15.14
    - name: Run Ruff style check
      run: |
        ruff check .
