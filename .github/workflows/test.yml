# This workflow runs the unit tests for the xslim project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Unit Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:

    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"
        cache-dependency-path: requirements.txt
    - name: Cache exported ONNX test models
      uses: actions/cache@v4
      with:
        path: .cache/test-models
        key: ${{ runner.os }}-py312-onnx-e2e-models-${{ hashFiles('requirements.txt') }}-${{ hashFiles('tests/test_quantize_pipeline.py') }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install --upgrade torch torchvision --index-url https://download.pytorch.org/whl/cpu
        grep -vE '^torch' requirements.txt | pip install --upgrade --upgrade-strategy eager -r /dev/stdin --index-url https://pypi.org/simple
        pip install --upgrade --no-deps -e .
    - name: Run unit and end-to-end tests
      env:
        XSLIM_TEST_MODEL_CACHE: .cache/test-models
      run: |
        python -m unittest discover -s tests -p "test_*.py" -v
